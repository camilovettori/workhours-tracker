  <style>

<script>
/* =========================
   Work Hours Tracker - report.html script (v3)
   FIXES:
   ✅ No crash (removed broken totals function + correct IDs)
   ✅ Totals always update (#totalHHMM / #totalPay)
   ✅ Week list pay corrected with premium (Sunday/BH)
   ✅ Safer BH cache, fewer calls
========================= */

const $ = (id) => document.getElementById(id);
const show = (el) => el && el.classList.remove("hidden");
const hide = (el) => el && el.classList.add("hidden");
const params = new URLSearchParams(location.search);
const weekParam = params.get("week");



function fmtEUR(n){
  const v = Number(n || 0);
  try { return v.toLocaleString(undefined, { style:"currency", currency:"EUR" }); }
  catch { return "€" + v.toFixed(2); }
}
    async function api(path, opts = {}){
      const res = await fetch(path, {
        credentials:"include",
        headers: { "Content-Type":"application/json", ...(opts.headers||{}) },
        ...opts
  });
  const ct = res.headers.get("content-type") || "";
  const data = ct.includes("application/json") ? await res.json() : await res.text();
  if(!res.ok){
    const msg = (data && data.detail) ? data.detail : (typeof data === "string" ? data : "Request failed");
    const e = new Error(msg);
    e.status = res.status;
    throw e;
      }
      return data;
    }

    let __toastHost = null;
    function ensureToastHost() {
      if (__toastHost) return __toastHost;
      if (!document.body) return null;

      __toastHost = document.createElement("div");
      __toastHost.className = "toastContainer";
      __toastHost.setAttribute("aria-live", "polite");
      __toastHost.setAttribute("aria-atomic", "true");
      document.body.appendChild(__toastHost);
      return __toastHost;
    }

    function showToast(message, type = "info") {
      const host = ensureToastHost();
      if (!host) return;

      const toast = document.createElement("div");
      const kind = ["success", "error", "info"].includes(type) ? type : "info";
      toast.className = `toastItem toastItem--${kind}`;
      toast.textContent = String(message || "");
      host.appendChild(toast);

      requestAnimationFrame(() => toast.classList.add("is-visible"));

      const dismiss = () => {
        toast.classList.remove("is-visible");
        window.setTimeout(() => toast.remove(), 180);
      };

      const timer = window.setTimeout(dismiss, 3000);
      toast.addEventListener("click", () => {
        window.clearTimeout(timer);
        dismiss();
      });
    }

/* =========================
   Helpers
========================= */
function getWeekId(){
  const p = new URLSearchParams(location.search);
  const w = p.get("week_id");
  return w ? Number(w) : null;
}
function goWeek(id){
  location.href = "/report?week_id=" + encodeURIComponent(id);
}
function tescoFiscalYearStart(fiscalYear) {
  const march1 = new Date(Number(fiscalYear) || 1970, 2, 1);
  const day = march1.getDay();
  if (day === 0) return march1;
  if (day <= 4) {
    march1.setDate(march1.getDate() - day);
    return march1;
  }
  march1.setDate(march1.getDate() + (7 - day));
  return march1;
}

/* =========================
   Profile (rate priority)
========================= */
let ME = null;
async function loadMe(){
  if (ME) return ME;
  try { ME = await api("/api/me"); }
  catch { ME = null; }
  return ME;
}

/* =========================
   Add week modal helpers
========================= */
function tescoWeekNumber(d = new Date()) {
  const dt = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  let fiscalYear = dt.getFullYear();
  let start = tescoFiscalYearStart(fiscalYear);

  if (dt < start) {
    fiscalYear -= 1;
    start = tescoFiscalYearStart(fiscalYear);
  } else {
    const nextStart = tescoFiscalYearStart(fiscalYear + 1);
    if (dt >= nextStart) {
      fiscalYear += 1;
      start = nextStart;
    }
  }

  return Math.floor((dt - start) / 86400000 / 7) + 1;
}

// IMPORTANT: your app uses week start as SUNDAY in other pages
function sundayOfThisWeek(d = new Date()){
  const x = new Date(d);
  x.setDate(x.getDate() - x.getDay()); // back to Sunday
  const y = x.getFullYear();
  const m = String(x.getMonth()+1).padStart(2,"0");
  const dd = String(x.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}
function openAddWeekModal2(defaultRate = 0){
  $("addWeekErr2").textContent = "";
  $("aw2WeekNumber").value = String(tescoWeekNumber(new Date()));
  $("aw2StartDate").value = sundayOfThisWeek(new Date());
  $("aw2HourlyRate").value = String(Number(defaultRate || 0).toFixed(2));
  show($("addWeekModal2"));
}
function closeAddWeekModal2(){
  hide($("addWeekModal2"));
  $("addWeekErr2").textContent = "";
}
function closeDayModal() {
  hide($("dayModal"));
}

/* =========================
   State
========================= */
let ACTIVE_WEEK_ID = null;
let ACTIVE_ENTRY_ID = null;

/* =========================
   Edit modal
========================= */
function openEditModal({ title, entryId, date, timeIn, timeOut, breakMin, note }){
  $("modalErr").textContent = "";
  $("modalTitle").textContent = title || "Edit day";
  ACTIVE_ENTRY_ID = entryId || null;

  $("mDate").value = date ? date : "";
  $("mIn").value = timeIn || "";
  $("mOut").value = timeOut || "";
  $("mBreak").value = String(Number(breakMin || 0));
  $("mNote").value = note || "";

  $("btnDeleteDay").style.display = entryId ? "" : "none";
  show($("editModal"));
}
function closeEditModal(){
  hide($("editModal"));
  $("modalErr").textContent = "";
}

/* =========================
   Day details modal
========================= */
async function openDayDetails(entryId) {
  const ddTitle = $("ddTitle");
  const ddClocked = $("ddClocked");
  const ddTesco = $("ddTesco");
  const ddResult = $("ddResult");

  try{
    const d = await api(`/api/day-details/${entryId}`);

    ddTitle.textContent = `${d.weekday} • ${d.date}`;

    ddClocked.innerHTML = `
      <strong>IN:</strong> ${d.clocked?.in || "—"}<br>
      <strong>OUT:</strong> ${d.clocked?.out || "—"}<br>
      <strong>Break real:</strong> ${d.clocked?.break_real ?? 0} min
    `;

    ddTesco.innerHTML = `
      <strong>Shift:</strong> ${d.tesco?.shift || "—"}<br>
      <strong>Tolerance:</strong> ${d.tesco?.tolerance || "—"}<br>
      <strong>Fixed break:</strong> ${d.tesco?.break_fixed ?? 60} min
    `;

    ddResult.innerHTML = `
      <strong>Hours made:</strong> ${d.result?.hours_made || "00:00"}<br>
      <strong>Hours paid:</strong> ${d.result?.hours_paid || "00:00"}<br>
      <strong>Pay:</strong> ${fmtEUR(Number(d.result?.pay ?? 0))}
    `;

    show($("dayModal"));
  }catch(err){
    alert(err.message || "Failed to load day details");
  }
}
function closeDayModal() {
  hide($("dayModal"));
}

/* =========================
   Views
========================= */
async function loadList(){
  hide($("viewDetail"));
  show($("viewList"));
  $("subTitle").textContent = "Select a week";
  $("weeksList").innerHTML = "";
  $("listErr").textContent = "";
  $("listMsg").textContent = "Loading...";

  try{
    const weeks = await api("/api/weeks", { method:"GET" });

    if(!weeks || !weeks.length){
      $("listMsg").textContent = "No weeks yet. Create a week first.";
      return;
    }

    $("listMsg").textContent = "";

    for(const w of weeks){
      const item = document.createElement("div");
      item.className = "weekItem";

      item.innerHTML = `
        <div class="weekLeft">
          <div class="t1">Week ${w.week_number}</div>
          <div class="t2">Start: ${w.start_date}</div>
        </div>
        <div class="weekRight">
          <div class="hhmm">${w.total_hhmm || "00:00"}</div>
          <div class="eur" data-week-pay="1">${fmtEUR(w.total_pay || 0)}</div>
        </div>
      `;
      item.addEventListener("click", () => goWeek(w.id));
      $("weeksList").appendChild(item);

    }
  }catch(e){
    $("listMsg").textContent = "";
    $("listErr").textContent = "Error loading weeks: " + (e.message || "failed");
    if(e.status === 401) location.href = "/";
  }
}

async function loadDetail(weekId){
  ACTIVE_WEEK_ID = weekId;

  hide($("viewList"));
  show($("viewDetail"));
  $("detailErr").textContent = "";
  $("rows").innerHTML = "";
  $("rateText").textContent = "—";
  $("startDateText").textContent = "—";
  $("totalHHMM").textContent = "00:00";
  $("totalPay").textContent = "€0.00";

  try{
    const w = await api("/api/weeks/" + weekId, { method:"GET" });

    $("subTitle").textContent = `Week ${w.week_number} • Weekly report`;
    $("rateText").textContent = `€${Number(w?.hourly_rate || 0).toFixed(2)} / hour`;
    $("startDateText").textContent = w.start_date || "—";

    const entries = Array.isArray(w.entries) ? w.entries : [];

    if(!entries.length){
      const tr = document.createElement("tr");
      tr.innerHTML = `<td colspan="8" class="muted">No days yet. Click “Add day”.</td>`;
      $("rows").appendChild(tr);
    } else {
      for(const e of entries){
        const rowPay = Number(e.pay_eur ?? 0);
        const tr = document.createElement("tr");
        tr.className = "rowClick";
        tr.dataset.entryId = e.id;

        tr.innerHTML = `
          <td>${e.weekday || ""}</td>
          <td>${e.work_date || ""}</td>
          <td>${e.time_in || "—"}</td>
          <td>${e.time_out || "—"}</td>
          <td>${(e.break_minutes ?? 0)}m</td>
          <td>${e.worked_hhmm || "00:00"}</td>
          <td>${fmtEUR(rowPay)}</td>
          <td>
            <button class="btn btn--soft btnSmall" type="button" data-details="1">View</button>
          </td>
        `;

        const btn = tr.querySelector('button[data-details="1"]');
        if (btn) {
          btn.addEventListener("click", (ev) => {
            ev.stopPropagation();
            openDayDetails(e.id);
          });
        }

        tr.addEventListener("click", () => {
          openEditModal({
            title: "Edit day",
            entryId: e.id,
            date: e.work_date,
            timeIn: e.time_in || "",
            timeOut: e.time_out || "",
            breakMin: e.break_minutes || 0,
            note: e.note || ""
          });
        });

        $("rows").appendChild(tr);
      }
    }

    $("totalHHMM").textContent = w?.totals?.total_hhmm || "00:00";
    $("totalPay").textContent  = fmtEUR(Number(w?.totals?.total_pay ?? 0));

  }catch(e){
    $("detailErr").textContent = "Error loading report: " + (e.message || "failed");
    if(e.status === 401) location.href = "/";
  }
}

   Binds
========================= */
$("btnPrint").addEventListener("click", () => window.print());

$("btnCloseModal").addEventListener("click", closeEditModal);
$("editModal").addEventListener("click", (e)=>{ if(e.target === $("editModal")) closeEditModal(); });

$("btnCloseAddWeek2").addEventListener("click", closeAddWeekModal2);
$("addWeekModal2").addEventListener("click", (e)=>{ if(e.target === $("addWeekModal2")) closeAddWeekModal2(); });

$("btnCloseDayModal").addEventListener("click", closeDayModal);
$("dayModal").addEventListener("click", (e)=>{ if(e.target === $("dayModal")) closeDayModal(); });

$("btnAddWeekHere").addEventListener("click", async () => {
  let defaultRate = 0;
  try{
    const me = await loadMe();
    defaultRate = Number(me?.hourly_rate || 0);
    if (!defaultRate) {
      const weeks = await api("/api/weeks", { method:"GET" });
      if (weeks && weeks.length) defaultRate = Number(weeks[0].hourly_rate || 0);
    }
  }catch{}
  openAddWeekModal2(defaultRate);
});

$("addWeekForm2").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  $("addWeekErr2").textContent = "";

  try{
    const week_number = Number($("aw2WeekNumber").value || 0);
    const start_date  = ($("aw2StartDate").value || "").trim();
    const hourly_rate = Number($("aw2HourlyRate").value || 0);

    await api("/api/weeks", {
      method:"POST",
      body: JSON.stringify({ week_number, start_date, hourly_rate })
    });

    closeAddWeekModal2();
    showToast("Week created.", "success");
    await loadList();
  }catch(e){
    $("addWeekErr2").textContent = e.message || "Failed to create week";
    showToast(e.message || "Failed to create week", "error");
    if(e.status === 401) location.href = "/";
  }
});

$("btnAddDay").addEventListener("click", () => {
  openEditModal({
    title: "Add day",
    entryId: null,
    date: "",
    timeIn: "",
    timeOut: "",
    breakMin: 0,
    note: ""
  });
});

$("btnDeleteWeek").addEventListener("click", async () => {
  if(!ACTIVE_WEEK_ID) return;
  const ok = confirm("Delete this week? This will remove all days inside it.");
  if(!ok) return;

  try{
    await api("/api/weeks/" + ACTIVE_WEEK_ID, { method:"DELETE" });
    location.href = "/report";
  }catch(e){
    $("detailErr").textContent = e.message || "Failed to delete week";
  }
});

$("editForm").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  $("modalErr").textContent = "";

  if(!ACTIVE_WEEK_ID){
    $("modalErr").textContent = "Missing week.";
    return;
  }

  const work_date = ($("mDate").value || "").trim();
  const time_in = ($("mIn").value || "").trim() || null;
  const time_out = ($("mOut").value || "").trim() || null;
  const break_minutes = Number($("mBreak").value || 0);
  const note = ($("mNote").value || "").trim() || null;

  if(!work_date){
    $("modalErr").textContent = "Pick a date.";
    return;
  }

  try{
    await api("/api/weeks/" + ACTIVE_WEEK_ID + "/entry", {
      method: "PUT",
      body: JSON.stringify({
        work_date,
        time_in,
        time_out,
        break_minutes,
        note,
        bh_paid: null
      })
    });

    closeEditModal();
    await loadDetail(ACTIVE_WEEK_ID);
  }catch(e){
    $("modalErr").textContent = e.message || "Failed to save day";
    if(e.status === 401) location.href = "/";
  }
});

$("btnDeleteDay").addEventListener("click", async () => {
  if(!ACTIVE_ENTRY_ID){
    closeEditModal();
    return;
  }
  const ok = confirm("Delete this day entry?");
  if(!ok) return;

  try{
    await api("/api/entries/" + ACTIVE_ENTRY_ID, { method:"DELETE" });
    closeEditModal();
    await loadDetail(ACTIVE_WEEK_ID);
  }catch(e){
    $("modalErr").textContent = e.message || "Failed to delete day";
  }
});

async function openCurrentWeek(){
  // jeito mais confiável: usa o dashboard que sempre sabe qual é a semana atual
  const dash = await api("/api/dashboard", { method: "GET" });

  const id =
    dash?.this_week?.id ||
    dash?.this_week?.week_id ||
    null;

  if (!id) {
    // se não tem semana atual, volta pra lista
    await loadList();
    return;
  }

  // abre direto o detail
  await loadDetail(Number(id));
}

/* =========================
   Init
========================= */
(async function init(){
  try{
    // ✅ se veio do dashboard pedindo "current"
    if (weekParam === "current") {
      await openCurrentWeek();
      return;
    }

    const id = getWeekId();
    if (id) await loadDetail(id);
    else await loadList();
  }catch(e){
    console.warn(e);
    location.href = "/";
  }
})();

(() => {
  document.querySelectorAll(".bottomNav [data-route]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const route = btn.getAttribute("data-route");
      if (route) location.href = route;
    });
  });
})();
